    const categoryNames = {
      all: '全部工具', productivity: '效率工具', image: '图片处理',
      file: '文件转换', life: '生活服务', education: '学习教育',
      design: '设计工具', dev: '编程开发', entertainment: '娱乐休闲'
    };

    let currentCategory = 'all';
    let searchQuery = '';

    function renderTools(filteredTools) {
      const grid = document.getElementById('tools-grid');
      grid.innerHTML = '';
      
      if (filteredTools.length === 0) {
        grid.innerHTML = `
          <div style="text-align: center; padding: 80px 0; grid-column: 1 / -1;">
            <div style="width: 80px; height: 80px; margin: 0 auto 24px; background: #f3f4f6; border-radius: 50%; display: flex; align-items: center; justify-content: center;">
              <svg width="40" height="40" viewBox="0 0 24 24" fill="#9ca3af"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>
            </div>
            <h3 style="font-size: 20px; font-weight: 600; color: #111827; margin-bottom: 8px;">未找到工具</h3>
            <p style="color: #6b7280;">尝试更换关键词或选择其他分类</p>
          </div>
        `;
        return;
      }

      filteredTools.forEach(tool => {
        const stars = Math.round(tool.pop / 20);
        const starHtml = Array(5).fill(0).map((_, i) => 
          `<span class="star ${i < stars ? 'star-filled' : 'star-empty'}"></span>`
        ).join('');
        
        const card = document.createElement('div');
        card.className = 'tool-card';
        card.innerHTML = `
          <div class="icon-box">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="#3b82f6">${icons[tool.icon] || icons.Link}</svg>
          </div>
          <div style="flex: 1; min-width: 0;">
            <h3 style="font-weight: 600; color: #111827; margin-bottom: 4px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;">${tool.name}</h3>
            <p style="font-size: 13px; color: #6b7280; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;">${tool.desc}</p>
            <div style="display: flex; align-items: center; justify-content: space-between; margin-top: 12px;">
              <div style="display: flex; align-items: center; gap: 4px;">
                ${starHtml}
                <span style="font-size: 12px; color: #9ca3af; margin-left: 8px;">${tool.pop}</span>
              </div>
              <div class="access-btn" style="display: flex; align-items: center; gap: 4px; color: #3b82f6; opacity: 0; transition: opacity 0.3s;">
                <span style="font-size: 12px; font-weight: 500;">访问</span>
                <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M9 5l7 7-7 7"/></svg>
              </div>
            </div>
          </div>
        `;
        card.onclick = () => window.open(tool.url, '_blank');
        card.onmouseenter = () => {
          const accessDiv = card.querySelector('.access-btn');
          if (accessDiv) accessDiv.style.opacity = '1';
        };
        card.onmouseleave = () => {
          const accessDiv = card.querySelector('.access-btn');
          if (accessDiv) accessDiv.style.opacity = '0';
        };
        grid.appendChild(card);
      });
    }

    function filterCategory(category) {
      currentCategory = category;
      
      document.querySelectorAll('.category-btn').forEach(btn => {
        if (btn.dataset.category === category) {
          btn.style.background = 'linear-gradient(135deg, #1e40af, #2563eb)';
          btn.style.color = 'white';
          btn.style.boxShadow = '0 4px 16px rgba(30,64,175,0.3)';
        } else {
          const bgMap = { productivity: '#fef3c7', image: '#fce7f3', file: '#dbeafe', life: '#dcfce7', education: '#f3e8ff', design: '#e0e7ff', dev: '#cffafe', entertainment: '#fee2e2' };
          const colorMap = { productivity: '#d97706', image: '#db2777', file: '#2563eb', life: '#16a34a', education: '#9333ea', design: '#6366f1', dev: '#0891b2', entertainment: '#dc2626' };
          const cat = btn.dataset.category;
          btn.style.background = bgMap[cat] || '#f3f4f6';
          btn.style.color = colorMap[cat] || '#6b7280';
          btn.style.boxShadow = 'none';
        }
      });

      document.getElementById('category-title').textContent = categoryNames[category] || '全部工具';
      const filtered = tools.filter(t => category === 'all' || t.category === category);
      document.getElementById('tool-count').textContent = `共找到 ${filtered.length} 个工具`;
      renderTools(filtered);
    }

    function handleSearch(query) {
      searchQuery = query.toLowerCase();
      const filtered = tools.filter(t => {
        const matchCat = currentCategory === 'all' || t.category === currentCategory;
        const matchSearch = !searchQuery || t.name.toLowerCase().includes(searchQuery) || t.desc.toLowerCase().includes(searchQuery);
        return matchCat && matchSearch;
      });
      document.getElementById('tool-count').textContent = `共找到 ${filtered.length} 个工具`;
      renderTools(filtered);
    }

    document.addEventListener('DOMContentLoaded', () => {
      renderTools(tools);
      
      if (window.innerWidth >= 768) {
        document.getElementById('desktop-search').style.display = 'block';
        document.getElementById('mobile-search').style.display = 'none';
      }
    });

    window.addEventListener('resize', () => {
      if (window.innerWidth >= 768) {
        document.getElementById('desktop-search').style.display = 'block';
        document.getElementById('mobile-search').style.display = 'none';
      } else {
        document.getElementById('desktop-search').style.display = 'none';
        document.getElementById('mobile-search').style.display = 'block';
      }
    });
  </script>
