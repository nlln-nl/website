    function saveToolsToStorage() {
      const text = JSON.stringify(tools);
      localStorage.setItem('tools_data', text);
      localStorage.setItem('tools_hash', getHash(text));
    }

    let lastFileHash = '';

    function getHash(text) {
      let hash = 0;
      for (let i = 0; i < text.length; i++) {
        hash = ((hash << 5) - hash) + text.charCodeAt(i);
        hash |= 0;
      }
      return Math.abs(hash).toString();
    }

    async function loadTools(forceRefresh = false) {
      try {
        const stored = localStorage.getItem('tools_data');
        if (!forceRefresh && stored) {
          tools = JSON.parse(stored);
          const storedHash = localStorage.getItem('tools_hash');
          if (storedHash) {
            lastFileHash = storedHash;
          }
        } else {
          try {
            const response = await fetch('tools.json?_t=' + Date.now());
            if (response.ok) {
              const text = await response.text();
              tools = JSON.parse(text);
              lastFileHash = getHash(text);
              localStorage.setItem('tools_data', text);
              localStorage.setItem('tools_hash', lastFileHash);
            } else {
              tools = [...defaultTools];
            }
          } catch {
            if (stored) {
              tools = JSON.parse(stored);
            } else {
              tools = [...defaultTools];
            }
          }
        }
      } catch {
        tools = [...defaultTools];
      }
      renderCategories();
      renderTools();

      const isLocal = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1' || window.location.protocol === 'file:';
      if (isLocal) {
        document.getElementById('admin-btn').style.display = 'block';
      }
    }

    async function checkFileUpdate() {
      try {
        const response = await fetch('tools.json?_t=' + Date.now());
        if (response.ok) {
          const text = await response.text();
          const currentHash = getHash(text);
          if (lastFileHash && lastFileHash !== currentHash) {
            tools = JSON.parse(text);
            lastFileHash = currentHash;
            localStorage.setItem('tools_data', text);
            localStorage.setItem('tools_hash', currentHash);
            renderCategories();
            renderTools();

            const toast = document.createElement('div');
            toast.className = 'update-toast';
            toast.innerHTML = '<i class="fa fa-refresh"></i> 数据已自动更新！';
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
          }
        }
      } catch (e) {
        console.log('自动检查更新失败（需HTTP服务器）:', e);
      }
    }

    function startFileWatcher() {
      setInterval(checkFileUpdate, 5000);
    }

    function refreshFromFile() {
      const input = document.createElement('input');
      input.type = 'file';
      input.accept = '.json';
      input.onchange = (e) => {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (event) => {
          try {
            const text = event.target.result;
            const imported = JSON.parse(text);
            if (Array.isArray(imported)) {
              tools = imported;
              lastFileHash = getHash(text);
              localStorage.setItem('tools_data', text);
              localStorage.setItem('tools_hash', lastFileHash);
              renderCategories();
              renderTools();
              populateCategorySelects();
              populateEditDropdown();
              alert('从文件刷新成功！');
            }
          } catch { alert('刷新失败，请检查文件格式'); }
        };
        reader.readAsText(file);
      };
      input.click();
    }

    function addCategory() {
      const name = document.getElementById('input-category-name').value.trim();
      const icon = document.getElementById('input-category-icon').value;
      const parentId = document.getElementById('input-parent-category').value;

      if (!name) {
        alert('请输入分类名称');
        return;
      }

      const newId = name.toLowerCase().replace(/\s+/g, '-');

      if (parentId) {
        const parent = categories.find(cat => cat.id === parentId);
        if (parent) {
          parent.children.push({ id: newId, name });
        } else {
          const grandparent = categories.find(cat => cat.children.find(ch => ch.id === parentId));
          if (grandparent) {
            const parentChild = grandparent.children.find(ch => ch.id === parentId);
            if (!parentChild.children) parentChild.children = [];
            parentChild.children.push({ id: newId, name });
          }
        }
      } else {
        categories.push({ id: newId, name, icon, children: [] });
      }

      renderCategories();
      renderTools();
      populateCategorySelects();
      document.getElementById('input-category-name').value = '';
      alert('分类添加成功！');
    }

        alert('请填写完整信息');
        return;

      const finalUrl = url.startsWith('http') ? url : 'https://' + url;

      tools.push({

      const url = document.getElementById('edit-url').value.trim();

      const finalUrl = url.startsWith('http') ? url : 'https://' + url;

      const data = JSON.stringify(tools, null, 2);
      const blob = new Blob([data], { type: 'application/json' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = 'tools.json';
      a.click();
      URL.revokeObjectURL(url);
    }

      input.accept = '.json';
      input.onchange = (e) => {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (event) => {
          try {
            const imported = JSON.parse(event.target.result);
            if (Array.isArray(imported)) {
              tools = imported;
              saveToolsToStorage();
              renderCategories();
              renderTools();
              alert('导入成功！');
            }
          } catch { alert('导入失败'); }
        };
        reader.readAsText(file);
      };
      input.click();
    }

    async function checkAllSites() {
      const btn = document.getElementById('check-btn');
      const progress = document.getElementById('check-progress');
      const results = document.getElementById('check-results');
      const text = document.getElementById('progress-text');
      const fill = document.getElementById('progress-fill');

      btn.disabled = true;
      btn.textContent = '检测中...';
      progress.style.display = 'block';
      results.innerHTML = '';

      let checked = 0, failed = 0;
      const total = tools.length;

      for (const tool of tools) {
        checked++;
        text.textContent = `${checked}/${total}`;
        fill.style.width = `${(checked / total) * 100}%`;

        const success = await checkSite(tool.url);
        const div = document.createElement('div');
        div.className = `check-result ${success ? 'check-success' : 'check-fail'}`;
        div.innerHTML = success ? `${tool.name} - 可用` : `${tool.name} - 无法访问`;
        results.appendChild(div);
        
        if (!success) failed++;
        await new Promise(r => setTimeout(r, 200));
      }

      btn.disabled = false;
      btn.textContent = '重新检测';
      
      const summary = document.createElement('div');
      summary.className = `check-summary ${failed === 0 ? 'summary-success' : 'summary-fail'}`;
      summary.innerHTML = failed === 0 ? '🎉 所有网站检测通过！' : `检测完成：${failed}个网站无法访问，请检查链接`;
      results.appendChild(summary);
    }

    async function checkSite(url) {
      try {
        const response = await fetch(url, { method: 'HEAD', mode: 'no-cors', signal: AbortSignal.timeout(10000) });
        return true;
      } catch {
        return false;
      }
    }

    document.getElementById('modal').addEventListener('click', (e) => {
      if (e.target.id === 'modal') closeModal();
    });

    setInterval(updateTime, 1000);
    updateTime();
    loadTools();
    startFileWatcher();
  </script>
</body>
</html>
